<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Link Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #040810;
            --bg-primary: rgba(8, 14, 28, 0.85);
            --bg-secondary: rgba(15, 23, 41, 0.9);
            --bg-card: rgba(17, 29, 51, 0.75);
            --bg-card-hover: rgba(22, 36, 64, 0.85);
            --accent: #00e5a0;
            --accent-dim: #00b37d;
            --text-primary: #e4eaf5;
            --text-secondary: #7b8fb0;
            --text-muted: #3f5478;
            --border: rgba(26, 42, 72, 0.6);
            --danger: #ff4757;
            --warning: #ffb347;
            --success: #00e5a0;
            --info: #4da6ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            background: url('https://cdn.areabermain.club/assets/cdn/az7/2026/06/13/20260613/6440b79d16d7215decaa0bf5a2f9f1a0/8e35011e-6793-4bfc-ba03-ac317c74beca.png') no-repeat center center fixed;
            background-size: cover;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, rgba(4,8,16,0.9) 0%, rgba(4,8,16,0.75) 100%);
            z-index: -1;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        
        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            transition: all 0.3s; 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .card:hover { border-color: rgba(0,229,160,0.3); background: var(--bg-card-hover); }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-dot.inactive { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .status-dot.checking { background: var(--warning); animation: blink 1s infinite; }
        .status-dot.unchecked { background: var(--text-muted); }
        .status-dot.invalid { background: #555; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-dim), var(--accent));
            color: var(--bg-deep); font-weight: 700; padding: 10px 24px;
            border-radius: 8px; border: none; cursor: pointer; transition: all 0.3s;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 0.03em; text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-primary:hover { box-shadow: 0 0 24px rgba(0,229,160,0.4); transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-ghost {
            background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
            font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.05); }
        
        .btn-sm {
            padding: 5px 12px; font-size: 0.7rem; border-radius: 6px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
        }
        .btn-sm.btn-blue { background: rgba(77,166,255,0.15); color: var(--info); border: 1px solid rgba(77,166,255,0.3); }
        .btn-sm.btn-blue:hover { background: rgba(77,166,255,0.25); }
        .btn-sm.btn-gray { background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-sm.btn-gray:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .search-input {
            background: rgba(15, 23, 41, 0.8); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px 12px 44px; color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif; font-size: 0.9rem;
            outline: none; transition: all 0.3s; width: 100%;
            backdrop-filter: blur(8px);
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.1); }
        .search-input::placeholder { color: var(--text-muted); }
        
        .domain-text {
            font-size: 0.85rem; color: var(--text-primary); font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        
        .card-header { cursor: pointer; user-select: none; }
        .toggle-icon { transition: transform 0.3s ease; }
        .card-header.collapsed .toggle-icon { transform: rotate(-90deg); }
        
        .toast-wrap { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 12px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
            animation: fadeUp 0.3s ease; display: flex; align-items: center;
            gap: 10px; min-width: 260px; backdrop-filter: blur(12px);
        }
        .toast-ok { background: rgba(0,229,160,0.15); border: 1px solid rgba(0,229,160,0.3); color: var(--success); }
        .toast-err { background: rgba(255,71,87,0.15); border: 1px solid rgba(255,71,87,0.3); color: var(--danger); }
        .toast-info { background: rgba(77,166,255,0.15); border: 1px solid rgba(77,166,255,0.3); color: var(--info); }
        
        .spinner { width: 14px; height: 14px; border: 2px solid transparent; border-top-color: var(--bg-deep); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
        .spinner-green { border-top-color: var(--accent); }
        
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(4,8,16,0.85);
            backdrop-filter: blur(8px); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 16px; padding: 28px; max-width: 600px; width: 92%;
            animation: fadeUp 0.3s ease; max-height: 85vh; overflow-y: auto;
        }
        .import-textarea {
            width: 100%; min-height: 120px; background: var(--bg-deep);
            border: 1px solid var(--border); border-radius: 8px; padding: 12px;
            color: var(--text-primary); font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem; resize: vertical; outline: none;
        }
        .tab-btn {
            padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
            cursor: pointer; border: 1px solid var(--border); background: transparent;
            color: var(--text-secondary); transition: all 0.2s;
        }
        .tab-btn.active { background: var(--accent); color: var(--bg-deep); border-color: var(--accent); }
        
        .progress-track { height: 4px; background: var(--border); overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); transition: width 0.3s; }
        
        .logo-badge {
            background: linear-gradient(135deg, var(--accent-dim), var(--accent));
            box-shadow: 0 0 15px rgba(0,229,160,0.4);
        }
    </style>
</head>
<body>

    <div class="toast-wrap" id="toastWrap"></div>

    <!-- Modal Setup -->
    <div class="modal-overlay" id="setupModal">
        <div class="modal-box">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
                <h3 style="font-size:1.2rem;font-weight:700"><i class="fas fa-cog" style="margin-right:10px;color:var(--accent)"></i>Pengaturan Sumber Data</h3>
                <button onclick="closeModal('setupModal')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2rem"><i class="fas fa-times"></i></button>
            </div>

            <div style="display:flex;gap:8px;margin-bottom:20px">
                <button class="tab-btn active" id="tabSheet" onclick="switchTab('sheet')"><i class="fas fa-cloud" style="margin-right:6px"></i>Google Sheets</button>
                <button class="tab-btn" id="tabPaste" onclick="switchTab('paste')"><i class="fas fa-paste" style="margin-right:6px"></i>Paste Data</button>
            </div>

            <div id="panelSheet">
                <div style="margin-bottom:16px">
                    <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:8px">Sheet ID</label>
                    <input id="inputSheetId" class="search-input" style="padding-left:16px" value="1ZfWeUfJfbB2o3o5-N85s5b0W2gM9_q72TwT38m-oIi8" placeholder="Masukkan Sheet ID">
                </div>
                <div style="margin-bottom:16px">
                    <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:8px">GID (Sheet Tab)</label>
                    <input id="inputGid" class="search-input" style="padding-left:16px" value="1803708013" placeholder="Masukkan GID">
                </div>
                <button class="btn-primary" style="width:100%;margin-bottom:16px" onclick="fetchSheetData(false)">
                    <i class="fas fa-sync-alt" style="margin-right:8px"></i>Muat Data
                </button>
            </div>

            <div id="panelPaste" style="display:none">
                <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:12px">Salin data dari Spreadsheet (Ctrl+A, Ctrl+C) dan paste di bawah ini:</p>
                <textarea id="pasteArea" class="import-textarea" placeholder="Paste data di sini..."></textarea>
                <button class="btn-primary" style="width:100%;margin-top:12px" onclick="importPastedData()">
                    <i class="fas fa-file-import" style="margin-right:8px"></i>Import Data
                </button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header style="background:var(--bg-primary);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)">
        <div style="display:flex;align-items:center;gap:16px">
            <div class="logo-badge" style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center">
                <i class="fas fa-link" style="color:var(--bg-deep);font-size:1.1rem"></i>
            </div>
            <div>
                <h1 style="font-size:1.3rem;font-weight:800;letter-spacing:-0.02em">Link Monitor</h1>
                <p style="font-size:0.75rem;color:var(--text-muted);margin-top:2px" class="mono">Dashboard Pengecekan Link</p>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
            <!-- Tombol Refresh Manual -->
            <button class="btn-ghost" onclick="fetchSheetData(false)" title="Muat Ulang Data dari Sheets">
                <i class="fas fa-sync-alt" id="refreshIcon"></i>
            </button>
            <button class="btn-ghost" onclick="openModal('setupModal')"><i class="fas fa-cog" style="margin-right:6px"></i>Pengaturan</button>
            <button class="btn-primary" onclick="checkAllLinks()" id="btnCheck">
                <i class="fas fa-bolt" style="margin-right:6px"></i>Cek Semua Link
            </button>
        </div>
    </header>

    <div class="progress-track" id="progressTrack" style="display:none">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <main style="padding:32px;max-width:1600px;margin:0 auto">
        
        <!-- Top Stats -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:20px;margin-bottom:32px">
            <div class="card" style="padding:24px;display:flex;align-items:center;gap:20px">
                <div style="width:56px;height:56px;border-radius:14px;background:rgba(77,166,255,0.15);display:flex;align-items:center;justify-content:center">
                    <i class="fas fa-link" style="color:var(--info);font-size:1.4rem"></i>
                </div>
                <div>
                    <p style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600">Total Link</p>
                    <h2 style="font-size:2rem;font-weight:800;margin:4px 0" id="statTotal">0</h2>
                    <p style="font-size:0.8rem;color:var(--text-secondary)">terdaftar</p>
                </div>
            </div>
            
            <div class="card" style="padding:24px;display:flex;align-items:center;gap:20px">
                <div style="width:56px;height:56px;border-radius:14px;background:rgba(255,179,71,0.15);display:flex;align-items:center;justify-content:center">
                    <i class="fas fa-layer-group" style="color:var(--warning);font-size:1.4rem"></i>
                </div>
                <div>
                    <p style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600">Kategori</p>
                    <h2 style="font-size:2rem;font-weight:800;margin:4px 0" id="statCategories">0</h2>
                    <p style="font-size:0.8rem;color:var(--text-secondary)">grup</p>
                </div>
            </div>
            
            <div class="card" style="padding:24px;display:flex;align-items:center;gap:20px">
                <div style="width:56px;height:56px;border-radius:14px;background:rgba(0,229,160,0.15);display:flex;align-items:center;justify-content:center">
                    <i class="fas fa-globe" style="color:var(--accent);font-size:1.4rem"></i>
                </div>
                <div>
                    <p style="font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600">Aset Digital</p>
                    <h2 style="font-size:2rem;font-weight:800;margin:4px 0" id="statDomains">0</h2>
                    <p style="font-size:0.8rem;color:var(--text-secondary)">domain & ip</p>
                </div>
            </div>
        </div>

        <!-- Search Bar -->
        <div style="margin-bottom:24px;position:relative;max-width:600px;margin-left:auto;margin-right:auto">
            <i class="fas fa-search" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.9rem"></i>
            <input class="search-input" placeholder="Cari domain atau nama link..." id="searchInput" oninput="handleSearch()">
        </div>

        <!-- Card Grid Container -->
        <div id="cardGrid" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));gap:20px;"></div>

        <!-- Empty State -->
        <div id="emptyState" class="card" style="text-align:center;padding:60px 20px;display:none">
            <i class="fas fa-inbox" style="font-size:3rem;margin-bottom:16px;display:block;color:var(--text-muted)"></i>
            <p style="font-size:1.1rem;margin-bottom:8px;color:var(--text-secondary)">Belum ada data</p>
            <p style="font-size:0.85rem;margin-bottom:24px;color:var(--text-muted)">Klik Pengaturan untuk menghubungkan Google Sheets</p>
            <button class="btn-primary" onclick="openModal('setupModal')">Hubungkan Data</button>
        </div>

    </main>

<script>
let rawData = []; 
let headers = [];
let linkStatus = {};
let searchQuery = '';
let isChecking = false;

// ==================== PARSER ====================
function parseCSV(text) {
    const rows = []; 
    let current = '', inQuotes = false, row = [];
    
    for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (inQuotes) {
            if (ch === '"') {
                if (i + 1 < text.length && text[i + 1] === '"') { current += '"'; i++; }
                else inQuotes = false;
            } else current += ch;
        } else {
            if (ch === '"') inQuotes = true;
            else if (ch === ',') { row.push(current.trim()); current = ''; }
            else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
                row.push(current.trim()); 
                if (row.some(c => c !== '')) rows.push(row);
                row = []; current = ''; 
                if (ch === '\r') i++;
            } else current += ch;
        }
    }
    if (current !== '' || row.length > 0) {
        row.push(current.trim());
        if (row.some(c => c !== '')) rows.push(row);
    }
    return rows;
}

function parseTSV(text) { return text.trim().split(/\r?\n/).map(line => line.split('\t').map(c => c.trim())); }

// ==================== NORMALISASI URL ====================
function normalizeURL(val) {
    if (!val) return null;
    let url = val.trim();
    if (!url) return null;
    
    if (url.startsWith('http://') || url.startsWith('https://')) return url;
    
    // Deteksi teks dengan titik tanpa spasi sebagai URL
    if (url.includes('.') && !url.includes(' ')) {
        return 'https://' + url;
    }
    
    return null;
}

// ==================== PROCESS DATA ====================
function processData(rows) {
    headers = rows[0].map(h => (h || '').replace(/^"|"$/g, '').trim());
    rawData = []; 
    linkStatus = {};

    for (let i = 1; i < rows.length; i++) {
        const row = rows[i] || [];
        const rowData = headers.map((h, idx) => (row[idx] || '').replace(/^"|"$/g, '').trim());
        
        if (rowData.some(val => val.trim() !== '')) {
            rawData.push(rowData);
        }
    }

    rawData.forEach((row, ri) => {
        row.forEach((val, ci) => {
            linkStatus[`${ri}_${ci}`] = 'unchecked';
        });
    });
}

// ==================== FETCH DATA ====================
async function fetchSheetData(isAutoUpdate = true) {
    const sheetId = document.getElementById('inputSheetId').value.trim();
    const gid = document.getElementById('inputGid').value.trim();
    if (!sheetId || !gid) return showToast('ID wajib diisi', 'err');
    
    // Animasi loading pada tombol refresh
    const refreshIcon = document.getElementById('refreshIcon');
    if(refreshIcon) refreshIcon.className = 'fas fa-sync-alt fa-spin';
    
    // Anti-cache: tambahkan timestamp unik di URL
    const ts = Date.now();
    const urls = [
        `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}&_=${ts}`,
        `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}&_=${ts}`,
        `https://docs.google.com/spreadsheets/d/${sheetId}/pub?gid=${gid}&single=true&output=csv&_=${ts}`
    ];

    let success = false;
    for (const url of urls) {
        try {
            const resp = await fetch(url, { cache: 'no-store' }); // Paksa tidak pakai cache
            if (!resp.ok) continue;
            const text = await resp.text();
            if (!text || text.length < 10) continue;
            const rows = parseCSV(text);
            if (rows.length < 2) continue;
            
            processData(rows); 
            success = true; 
            break;
        } catch (e) { console.warn("Fetch error:", e); }
    }

    if(refreshIcon) refreshIcon.className = 'fas fa-sync-alt';

    if (success) {
        if (!isAutoUpdate) {
            showToast(`Data berhasil diperbarui: ${rawData.length} baris`, 'ok');
            closeModal('setupModal');
        }
    } else {
        if (!isAutoUpdate) showToast('Gagal mengambil data. Pastikan sheet berbagi "Anyone can view"', 'err');
    }
    renderAll();
}

// ==================== RENDER UI ====================
function renderAll() { renderStats(); renderCards(); }

function renderStats() {
    let totalLinks = 0; 
    const domains = new Set();
    
    rawData.forEach((row, ri) => {
        if (row[0]) domains.add(row[0]); 
        row.forEach((val, ci) => {
            if (ci > 0 && normalizeURL(val)) totalLinks++;
        });
    });
    
    document.getElementById('statTotal').textContent = totalLinks;
    document.getElementById('statCategories').textContent = headers.length > 1 ? headers.length - 1 : 0;
    document.getElementById('statDomains').textContent = domains.size;
}

function handleSearch() { 
    searchQuery = document.getElementById('searchInput').value.trim().toLowerCase(); 
    renderCards(); 
}

function toggleCard(headerEl) {
    const content = headerEl.nextElementSibling;
    if (content.style.display === 'none') {
        content.style.display = 'block';
        headerEl.classList.remove('collapsed');
    } else {
        content.style.display = 'none';
        headerEl.classList.add('collapsed');
    }
}

// Fungsi untuk menutup kartu secara otomatis saat link dibuka
function closeParentCard(el) {
    const card = el.closest('.card');
    if (!card) return;
    const header = card.querySelector('.card-header');
    const content = card.querySelector('.card-content');
    if (content && content.style.display !== 'none') {
        content.style.display = 'none';
        if(header) header.classList.add('collapsed');
    }
}

function renderCards() {
    const grid = document.getElementById('cardGrid');
    const empty = document.getElementById('emptyState');
    
    if (rawData.length === 0) {
        grid.innerHTML = ''; empty.style.display = 'block'; return;
    }
    empty.style.display = 'none';

    let html = '';
    
    headers.forEach((h, ci) => {
        if (ci === 0 || !h || h.trim() === '') return;

        let linksInCat = [];
        
        rawData.forEach((row, ri) => {
            const val = row[ci] || '';
            const url = normalizeURL(val);
            if (url) {
                let displayName = row[0] && row[0].trim() !== '' ? row[0] : shortenURL(url);
                
                if (searchQuery && !displayName.toLowerCase().includes(searchQuery) && !url.toLowerCase().includes(searchQuery) && !val.toLowerCase().includes(searchQuery)) return;
                linksInCat.push({ ri, ci, url: url, domain: displayName });
            }
        });

        if (linksInCat.length === 0) return;

        html += `
        <div class="card" style="display:flex;flex-direction:column;overflow:hidden">
            <div class="card-header" onclick="toggleCard(this)" style="padding:20px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);display:flex;justify-content:space-between;align-items:center">
                <div>
                    <h3 style="font-size:1.1rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em">${escHTML(h)}</h3>
                    <p style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">${linksInCat.length} link terdaftar</p>
                </div>
                <i class="fas fa-chevron-down toggle-icon" style="color:var(--text-muted);font-size:0.9rem"></i>
            </div>
            <div class="card-content" style="display:block">
                <div style="padding:12px;max-height:320px;overflow-y:auto">
        `;

        linksInCat.forEach(link => {
            const key = `${link.ri}_${link.ci}`;
            const st = linkStatus[key] || 'unchecked';
            html += `
                <div style="display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,0.02);transition:background 0.2s" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'">
                    <span class="status-dot ${st}"></span>
                    <span class="domain-text" style="flex:1" title="${escHTML(link.domain)}">${escHTML(link.domain)}</span>
                    
                    <a href="${escAttr(link.url)}" target="_blank" rel="noopener noreferrer" class="btn-sm btn-blue" onclick="closeParentCard(this)" title="Buka Link">
                        <i class="fas fa-external-link-alt"></i> Buka Link
                    </a>
                    
                    <button onclick="event.stopPropagation();copyLink('${escAttr(link.url)}')" class="btn-sm btn-gray" title="Salin Link">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            `;
        });

        html += `</div>
                <div style="padding:16px;border-top:1px solid var(--border)">
                    <button class="btn-primary" style="width:100%;font-size:0.8rem;padding:10px" onclick="openAllCategory(${ci}, this)">
                        <i class="fas fa-external-link-alt" style="margin-right:6px"></i>BUKA SEMUA
                    </button>
                </div>
            </div>
        </div>`;
    });

    grid.innerHTML = html;
}

function openAllCategory(ci, btnEl) {
    let count = 0;
    rawData.forEach(row => {
        const val = row[ci] || '';
        const url = normalizeURL(val);
        if (url) {
            window.open(url, '_blank');
            count++;
        }
    });
    
    if (btnEl) closeParentCard(btnEl);
    if (count > 0) showToast(`Mencoba membuka ${count} link...`, 'info');
}

// ==================== LINK CHECKING ====================
async function checkSingleLink(url) {
    if (!url || !url.startsWith('http')) return 'invalid';
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);
        await fetch(url, { mode: 'no-cors', signal: controller.signal, cache: 'no-store' });
        clearTimeout(timeout);
        return 'active';
    } catch (e) { return 'inactive'; }
}

async function checkAllLinks() {
    if (isChecking) return;
    if (rawData.length === 0) return showToast('Tidak ada data', 'err');
    isChecking = true;
    const btn = document.getElementById('btnCheck');
    btn.disabled = true; 
    btn.innerHTML = '<span class="spinner" style="margin-right:8px"></span>Mengecek...';
    document.getElementById('progressTrack').style.display = 'block';

    const tasks = [];
    rawData.forEach((row, ri) => row.forEach((val, ci) => {
        const url = normalizeURL(val);
        if (ci > 0 && url) tasks.push({ ri, ci, url: url });
    }));

    let done = 0;
    const batchSize = 5;
    for (let i = 0; i < tasks.length; i += batchSize) {
        const batch = tasks.slice(i, i + batchSize);
        await Promise.all(batch.map(async (t) => {
            linkStatus[`${t.ri}_${t.ci}`] = 'checking';
            renderCards();
            const result = await checkSingleLink(t.url);
            linkStatus[`${t.ri}_${t.ci}`] = result;
            done++;
            document.getElementById('progressFill').style.width = `${(done / tasks.length * 100).toFixed(1)}%`;
            renderCards();
        }));
    }

    isChecking = false;
    btn.disabled = false; 
    btn.innerHTML = '<i class="fas fa-bolt" style="margin-right:6px"></i>Cek Semua Link';
    setTimeout(() => document.getElementById('progressTrack').style.display = 'none', 1500);
    showToast('Pengecekan selesai', 'ok');
}

// ==================== UTILITAS ====================
function escHTML(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function shortenURL(url) {
    try { 
        const u = new URL(url); 
        let p = u.pathname + u.search; 
        if (p.length > 20) p = p.substring(0, 18) + '...'; 
        if (p === '/') p = ''; 
        return u.hostname + p; 
    } catch (e) { 
        return url.length > 35 ? url.substring(0, 33) + '...' : url; 
    }
}
function copyLink(url) { navigator.clipboard.writeText(url).then(() => showToast('Link disalin', 'ok')).catch(() => showToast('Gagal salin', 'err')); }
function showToast(msg, type) {
    const wrap = document.getElementById('toastWrap');
    const cls = type === 'ok' ? 'toast-ok' : type === 'err' ? 'toast-err' : 'toast-info';
    const icon = type === 'ok' ? 'fa-check-circle' : type === 'err' ? 'fa-exclamation-circle' : 'fa-info-circle';
    const el = document.createElement('div');
    el.className = `toast ${cls}`;
    el.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
    wrap.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function switchTab(tab) {
    document.getElementById('tabSheet').classList.toggle('active', tab === 'sheet');
    document.getElementById('tabPaste').classList.toggle('active', tab === 'paste');
    document.getElementById('panelSheet').style.display = tab === 'sheet' ? 'block' : 'none';
    document.getElementById('panelPaste').style.display = tab === 'paste' ? 'block' : 'none';
}
function importPastedData() {
    const text = document.getElementById('pasteArea').value.trim();
    if (!text) return;
    const rows = text.includes('\t') ? parseTSV(text) : parseCSV(text);
    if (rows.length < 2) return;
    processData(rows); 
    closeModal('setupModal'); 
    renderAll(); 
    showToast('Data diimpor', 'ok');
}

// ==================== INIT ====================
function init() { 
    fetchSheetData(true); // Saat baru buka, langsung ambil data (tanpa notifikasi)
    
    // Set auto-refresh setiap 60 detik (1 menit)
    setInterval(() => {
        fetchSheetData(true);
    }, 60000);
}

init();
</script>
