<style>
  :root {

    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;

  /* Overlay agar background tidak mengganggu teks */
  .bg-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: rgba(7, 7, 11, 0.82);

  .glass {

    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 20px;

  .glass-strong {

    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);

  .cat-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; position: relative; }
  .cat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent); opacity: 0; transition: opacity 0.4s ease; }

  .cat-card.expanded { background: rgba(255,255,255,0.05); border-color: var(--border-strong); }

  .cat-card.expanded .cat-chevron { transform: rotate(180deg); }

  .input-search:focus { outline: none; border-color: var(--gold); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }

  .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 18px 20px; transition: all 0.3s ease; position: relative; overflow: hidden; }

  .stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.1); }

  .cat-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

  /* Toast */
  .toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; max-width: calc(100vw - 48px); }
  .toast { background: rgba(14,14,21,0.95); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; color: var(--fg); font-size: 13px; display: flex; align-items: flex-start; gap: 10px; min-width: 280px; max-width: 360px; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.6); }
  .toast.success { border-color: rgba(16,185,129,0.35); }
  .toast.error { border-color: rgba(244,63,94,0.35); }
  .toast.info { border-color: rgba(212,175,55,0.35); }
  @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold-bright); box-shadow: 0 0 12px var(--gold-bright); animation: livePulse 1.5s infinite; }
  @keyframes livePulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.75); } }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.2); border-radius: 4px; }

  .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .ticker { font-variant-numeric: tabular-nums; }

  .filter-pill { padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 500; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); color: var(--muted); cursor: pointer; transition: all 0.25s ease; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
  .filter-pill:hover { color: var(--fg); border-color: rgba(255,255,255,0.18); }

</style>

  { id: 'kepala8', title: 'KEPALA 8', subtitle: 'Alternatif domain kepala 8', icon: 'fa-8', color: '#ef4444', links: [ { name: 'on88863.com', url: 'https://on88863.com' }, { name: 'on89958.com', url: 'https://on89958.com' }, { name: 'on014.com', url: 'https://on014.com' }, { name: 'on85990.com', url: 'https://on85990.com' }, { name: 'on86408.com', url: 'https://on86408.com' }, { name: 'on87213.com', url: 'https://on87213.com' } ] },

categories.forEach(c => { c.links.forEach(l => { if (!/^https?:\/\//.test(l.url)) l.url = 'https://' + l.url; }); });

const state = { expanded: new Set(), search: '' };

function extractDomain(url) { try { const u = new URL(url); return u.hostname + (u.pathname && u.pathname !== '/' ? u.pathname : ''); } catch { return url; } }
function getHostname(url) { try { return new URL(url).hostname; } catch { return url; } }
function hexToRgba(hex, a) { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render() {
  const container = document.getElementById('categories');
  const filtered = categories.filter(c => {
    if (state.search) {
      const q = state.search.toLowerCase();
      const inTitle = c.title.toLowerCase().includes(q) || c.subtitle.toLowerCase().includes(q);
      const inLinks = c.links.some(l => l.name.toLowerCase().includes(q) || l.url.toLowerCase().includes(q));
      if (!inTitle && !inLinks) return false;
    }
    return true;
  });

  if (filtered.length === 0) { container.innerHTML = `<div class="empty-state col-span-full"><i class="fa-solid fa-magnifying-glass text-3xl mb-3 opacity-30"></i><div class="text-sm">Tidak ada hasil</div></div>`; updateStats(); updateToggleButton(); return; }

  container.innerHTML = filtered.map(cat => {
    const expanded = state.expanded.has(cat.id);
    const total = cat.links.length;

    const visibleLinks = cat.links.filter(l => {
      if (state.search) { const q = state.search.toLowerCase(); return l.name.toLowerCase().includes(q) || l.url.toLowerCase().includes(q); }
      return true;
    });

    return `
    <div class="cat-card glass reveal ${expanded ? 'expanded' : ''}" data-id="${cat.id}">
      <div class="cat-header p-5 flex items-center gap-4" onclick="toggleCategory('${cat.id}')">

          </div>
          <div class="text-xs text-zinc-500 mt-0.5 truncate">${escapeHtml(cat.subtitle)}</div>
        </div>
        <button onclick="event.stopPropagation(); openAll('${cat.id}')" class="btn-open-all" title="Buka semua link di tab baru"><i class="fa-solid fa-up-right-from-square"></i><span>Buka Semua</span></button>

      </div>

          ${visibleLinks.length === 0 ? `<div class="text-center text-xs text-zinc-600 py-4">Tidak ada link yang cocok</div>` : ''}
          ${visibleLinks.map(l => {
            const domain = extractDomain(l.url);
            const hostname = getHostname(l.url);
            const faviconUrl = `https://www.google.com/s2/favicons?domain=${encodeURIComponent(hostname)}&sz=64`;
            return `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer" class="link-item" data-url="${escapeHtml(l.url)}" onclick="event.stopPropagation();">

  if (!card) return;
  const linkElements = Array.from(card.querySelectorAll('.link-item'));
  
  showToast(`Menyiapkan ${linkElements.length} link dari ${cat.title}...`, 'info', 'fa-list-check');

  if (linkElements.length > 0) {
    const firstEl = linkElements[0];
    firstEl.classList.add('clicking');
    const firstUrl = firstEl.getAttribute('href');
    const win = window.open(firstUrl, '_blank');
    
    setTimeout(() => firstEl.classList.remove('clicking'), 800);

    if (!win || win.closed || typeof win.closed == 'undefined') {
      showToast('Browser memblokir pop-up. Klik ikon pop-up (kotak merah) di address bar browser Anda, pilih "Selalu izinkan pop-up", lalu klik tombol Buka Semua lagi.', 'error', 'fa-triangle-exclamation', 8000);
      return;
    }
  }

  linkElements.slice(1).forEach((el, i) => {
    setTimeout(() => {
      el.classList.add('clicking');
      const url = el.getAttribute('href');
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => el.classList.remove('clicking'), 800);
    }, (i + 1) * 700);
  });
}

function toggleAllCategories() {
  const allExpanded = categories.every(c => state.expanded.has(c.id)) && categories.length > 0;
  if (allExpanded) state.expanded.clear(); else categories.forEach(c => state.expanded.add(c.id));
  render();
}

function updateToggleButton() {
  const allExpanded = categories.every(c => state.expanded.has(c.id)) && categories.length > 0;
  document.getElementById('toggle-label').textContent = allExpanded ? 'Tutup Semua' : 'Buka Semua';
  document.querySelector('#toggle-all i').className = allExpanded ? 'fa-solid fa-chevron-up text-[10px]' : 'fa-solid fa-chevron-down text-[10px]';
}

function updateStats() {
  let total = 0, domainIp = 0;
  categories.forEach(c => { 
    c.links.forEach(l => { 
      total++; 
      if(c.id === 'kepala3' || c.id === 'kepala8' || c.id === 'fusion' || c.id === 'itcom' || c.id === 'landing') domainIp++;
    }); 
  });
  animateNumber('stat-total', total); 
  animateNumber('stat-domain', domainIp); 
  animateNumber('stat-cat', categories.length);
}

function animateNumber(id, target) {
  const el = document.getElementById(id); const current = parseInt(el.textContent) || 0;
  if (current === target) return; const step = target > current ? 1 : -1; const steps = Math.abs(target - current);
  if (steps === 0) return; const interval = Math.max(20, 400 / steps); let val = current;
  const timer = setInterval(() => { val += step; el.textContent = val; if (val === target) clearInterval(timer); }, interval);
}

function showToast(msg, type = 'info', icon = 'fa-circle-info', duration = 3500) {
  const container = document.getElementById('toasts');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const colors = { success: 'text-emerald-400', error: 'text-rose-400', info: 'text-amber-400' };
  toast.innerHTML = `<i class="fa-solid ${icon} ${colors[type]} mt-0.5"></i><span class="flex-1">${escapeHtml(msg)}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.transition = 'all 0.3s ease'; toast.style.transform = 'translateX(120%)'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 320); }, duration);
}

document.getElementById('search').addEventListener('input', (e) => { state.search = e.target.value; render(); });
document.getElementById('toggle-all').addEventListener('click', toggleAllCategories);

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'Escape' && document.activeElement.tagName === 'INPUT') { document.getElementById('search').value = ''; state.search = ''; render(); document.activeElement.blur(); }
});

render();
</script>
